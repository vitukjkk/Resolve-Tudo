<head>
    <meta charset="UTF-8">
    <title>Resolve Tudo - Página Inicial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="icon" href="assets/images/logo_resolve tudo azul.png">
    <script src="script/buttons.js"></script>
    <script src="script/manage.js"></script>
</head>
<body>
    <header>
        <a href="index.html" style="text-decoration: none;color: white">
            <h1>Resolve Tudo</h1>
        </a>
    </header>
    <main>
        <div class="divGeral">
            <h1>Geral</h1>
            <form>
                <label>adicione qualquer número ou operação</label><br>
                <input
                    id="geralcalc"
                    type="text"
                             oninput="module = 1"> <br>
                <button onclick="somarButton()">+</button>
                <button onclick="subButton()">-</button>
                <button onclick="divButton()">/</button>
                <button onclick="multButton()">*</button>
                <button onclick="equalButton();module = 1">=</button>
                <br>
                <button onclick="dotButton();module = 1">.</button>
                <button onclick="leftParButton();module = 1">(</button>
                <button onclick="rightParButton();module = 1">)</button>
                <button onclick="clearButton();module = 1">C</button>
                <button onclick="apagarButton();module = 1">A</button>
            </form>
          </div>
    </main>
    <footer>
        Resolve Tudo - 2024 - desenvolvido por <a href="https://github.com/vitukjkkk">vitukjkkk</a>
    </footer>
</body>
